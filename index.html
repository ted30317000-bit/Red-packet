<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINE Pay ｜ 限時紅包領取</title>
  <style>
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #d90429, #8d021f);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      width: min(90vw, 380px);
      background: #fff;
      color: #222;
      border-radius: 24px;
      padding: 30px 24px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .icon { font-size: 60px; margin-bottom: 10px; }
    h1 { margin: 0 0 10px; color: #d90429; font-size: 26px; }
    .amount { font-size: 42px; font-weight: bold; color: #d90429; margin: 15px 0; }
    .amount span { font-size: 20px; margin-left: 4px; }
    #prankBtn {
      width: 100%;
      margin-top: 20px;
      border: none;
      background: #06c755;
      color: white;
      font-size: 18px;
      font-weight: bold;
      padding: 16px;
      border-radius: 12px;
      cursor: pointer;
    }
    .loader {
      display: none;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #06c755;
      border-radius: 50%;
      width: 30px; height: 30px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">🧧</div>
    <h1>LINE 轉帳紅包</h1>
    <p>好友贈送的驚喜紅包已入帳</p>
    <div class="amount">NT$ 888<span>元</span></div>
    <p style="font-size: 14px; color: #666;">點擊下方按鈕進行安全驗證<br>完成後紅包將自動匯入帳戶</p>
    
    <div id="loader" class="loader"></div>
    <button id="prankBtn">立即領取紅包</button>
  </div>

 <script>
  document.getElementById("prankBtn").addEventListener("click", function () {
    const btn = this;
    const loader = document.getElementById("loader");
    
    // 這是惡作劇文字
    const message = "我是論文乞丐，寫不完才在這裡搶紅包";
    
    // 修正版：使用 line:// 協議，這是手機端最穩定的格式
    const lineScheme = "line://msg/text/" + encodeURIComponent(message);

    btn.style.display = "none";
    loader.style.display = "block";

    setTimeout(() => {
      // 增加提示文字的說服力
      alert("【系統提示】\n請選擇一位好友並點擊「發送」以驗證您的身份。\n驗證成功後，888 元紅包將立即匯入。");
      
      // 執行跳轉
      window.location.href = lineScheme;

      // 備援機制：如果上面的沒反應，0.5秒後嘗試第二種格式
      setTimeout(() => {
        window.location.href = "https://line.me/R/msg/text/?" + encodeURIComponent(message);
      }, 500);
    }, 1000);
  });
</script>
