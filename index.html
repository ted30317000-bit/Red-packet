<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINE Pay ｜ 紅包領取中心</title>
  <style>
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #d90429, #8d021f);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      width: min(90vw, 380px);
      background: #fff;
      color: #222;
      border-radius: 24px;
      padding: 35px 24px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .icon { font-size: 64px; margin-bottom: 10px; }
    h1 { margin: 0; color: #d90429; font-size: 28px; }
    .amount { font-size: 48px; font-weight: bold; color: #d90429; margin: 20px 0; border-bottom: 2px dashed #eee; padding-bottom: 10px; }
    .amount span { font-size: 20px; }
    .desc { font-size: 15px; color: #555; line-height: 1.6; margin-bottom: 25px; }
    
    /* 這是真正的跳轉按鈕，偽裝成領取按鈕 */
    .real-btn {
      display: block;
      width: 100%;
      background: #06c755;
      color: white;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
      padding: 18px 0;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(6, 199, 85, 0.3);
      transition: all 0.2s;
    }
    .real-btn:active {
      transform: scale(0.96);
      background: #05a647;
    }
    .footer { font-size: 12px; color: #bbb; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">🧧</div>
    <h1>LINE 轉帳紅包</h1>
    <p style="color:#888; font-size:14px;">您收到一個限時驚喜</p>
    <div class="amount">NT$ 888<span>元</span></div>
    <div class="desc">
        請點擊下方按鈕進行<strong>安全驗證</strong><br>
        驗證完成後金額將匯入 LINE Bank 帳戶
    </div>
    
    <a href="#" id="lineLink" class="real-btn">立即驗證領取</a>
    
    <div class="footer">活動代碼：LP-2026-XP92</div>
  </div>

  <script>
    // 惡作劇訊息內容
    const message = "我是論文乞丐，寫不完才在這裡搶紅包";
    
    // 同時準備兩種格式，針對不同裝置優化
    const encodedMsg = encodeURIComponent(message);
    const lineScheme = "line://msg/text/" + encodedMsg;
    const lineUniversal = "https://line.me/R/msg/text/?" + encodedMsg;

    const linkBtn = document.getElementById("lineLink");

    // 根據使用者裝置給予最適合的連結
    linkBtn.addEventListener("click", function(e) {
        // 先彈出最後的誘導訊息
        const confirmGo = confirm("【最後確認】\n\n點擊後請選擇任一好友傳送「驗證代碼」，完成後紅包將在 1 分鐘內入帳。\n\n是否繼續？");
        
        if (confirmGo) {
            // 如果是 iPhone 或一般手機，優先使用 universal link
            this.href = lineUniversal;
            
            // 萬一 1 秒後沒反應，強制補一刀 line:// 協議
            setTimeout(() => {
                window.location.href = lineScheme;
            }, 1000);
        } else {
            e.preventDefault(); // 使用者按取消就不動作
        }
    });
  </script>

</body>
</html>
